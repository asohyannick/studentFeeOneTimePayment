spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
  cache:
    ttl-minutes: ${REDIS_TTL_MINUTES}
  datasource:
    url: jdbc:postgresql://localhost:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

server:
  port: 8080

logging:
  level:
    root: INFO
    com.leedTech: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true