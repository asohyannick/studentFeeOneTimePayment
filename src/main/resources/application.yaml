spring:
  application:
    name: ${APP_NAME}
  config:
    import: optional:file:.env.properties
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
      resources:
        add-mappings: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
      file-size-threshold: 2KB
      resolve-lazily: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
  cache:
    ttl-minutes: ${REDIS_TTL_MINUTES}
  datasource:
    url: jdbc:postgresql://localhost:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
      hibernate:
        format_sql: true
        ddl-auto: validate
        show-sql: true
        open-in-view: false
  mail:
    host: ${MAIL_TRAP_HOST}
    port: ${MAIL_TRAP_PORT}
    username: ${MAIL_TRAP_USERNAME}
    password: ${MAIL_TRAP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
  mailtrap:
    from-email: ${MAIL_FROM}
    from-name: ${MAIL_FROM_NAME}

server:
  port: ${PORT}
  tomcat:
    max-swallow-size: 50MB
    max-http-form-post-size: 50MB
    max-connections: 200
  error:
    whitelabel:
      enabled: false
    path: /error
    include-message: always
    include-binding-errors: always

api:
  version: ${API_VERSION}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}
  magic-link-expiration-ms: ${JWT_MAGIC_LINK_EXPIRATION_TOKEN_MS}

stripe:
  api-key: ${STRIPE_API_KEY}

cors:
  allowed-origins: ${FRONTEND_DOMAINS}
  allowed-methods: ${ALLOWED_METHODS}

mailtrap:
  api-token: ${MAILTRAP_API_TOKEN}
  from-email: ${MAIL_FROM}
  from-name: ${MAIL_FROM_NAME}

firebase:
  project-id: ${FIREBASE_PROJECT_ID}
  private-key-id: ${FIREBASE_PRIVATE_KEY_ID}
  private-key: ${FIREBASE_PRIVATE_KEY}
  client-email: ${FIREBASE_CLIENT_EMAIL}
  client-id: ${FIREBASE_CLIENT_ID}

