version: '3.8'

services:

  # ─── Spring Boot Application ───────────────────────────────────────
  app:
    build: .
    container_name: leedtech-api
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # ─── Application ──────────────────────────────────────────
      APP_NAME: ${APP_NAME}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      PORT: ${PORT:-8080}
      API_VERSION: ${API_VERSION:-v1}

      # ─── Database ─────────────────────────────────────────────
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      # ─── Redis ────────────────────────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_TTL_MINUTES: ${REDIS_TTL_MINUTES:-30}

      # ─── JWT ──────────────────────────────────────────────────
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}

      # ─── Stripe ───────────────────────────────────────────────
      STRIPE_API_KEY: ${STRIPE_API_KEY}

      # ─── Cloudinary ───────────────────────────────────────────
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # ─── Mailtrap ─────────────────────────────────────────────
      MAILTRAP_API_TOKEN: ${MAILTRAP_API_TOKEN}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}

      # ─── Firebase ─────────────────────────────────────────────
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY_ID: ${FIREBASE_PRIVATE_KEY_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_CLIENT_ID: ${FIREBASE_CLIENT_ID}

      # ─── CORS ─────────────────────────────────────────────────
      FRONTEND_DOMAINS: ${FRONTEND_DOMAINS:-http://localhost:4200}
      ALLOWED_METHODS: ${ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}

      # ─── Seeder ───────────────────────────────────────────────
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD}
      SEED_PRINCIPAL_EMAIL: ${SEED_PRINCIPAL_EMAIL}
      SEED_PRINCIPAL_PASSWORD: ${SEED_PRINCIPAL_PASSWORD}
      SEED_VICE_PRINCIPAL_EMAIL: ${SEED_VICE_PRINCIPAL_EMAIL}
      SEED_VICE_PRINCIPAL_PASSWORD: ${SEED_VICE_PRINCIPAL_PASSWORD}
      SEED_SCHOOL_DIRECTOR_EMAIL: ${SEED_SCHOOL_DIRECTOR_EMAIL}
      SEED_SCHOOL_DIRECTOR_PASSWORD: ${SEED_SCHOOL_DIRECTOR_PASSWORD}
      SEED_SECRETARY_EMAIL: ${SEED_SECRETARY_EMAIL}
      SEED_SECRETARY_PASSWORD: ${SEED_SECRETARY_PASSWORD}
      SEED_RECEPTIONIST_EMAIL: ${SEED_RECEPTIONIST_EMAIL}
      SEED_RECEPTIONIST_PASSWORD: ${SEED_RECEPTIONIST_PASSWORD}
      SEED_TEACHER_EMAIL: ${SEED_TEACHER_EMAIL}
      SEED_TEACHER_PASSWORD: ${SEED_TEACHER_PASSWORD}
      SEED_PROFESSOR_EMAIL: ${SEED_PROFESSOR_EMAIL}
      SEED_PROFESSOR_PASSWORD: ${SEED_PROFESSOR_PASSWORD}
      SEED_HEAD_OF_DEPARTMENT_EMAIL: ${SEED_HEAD_OF_DEPARTMENT_EMAIL}
      SEED_HEAD_OF_DEPARTMENT_PASSWORD: ${SEED_HEAD_OF_DEPARTMENT_PASSWORD}
      SEED_CLASS_TEACHER_EMAIL: ${SEED_CLASS_TEACHER_EMAIL}
      SEED_CLASS_TEACHER_PASSWORD: ${SEED_CLASS_TEACHER_PASSWORD}
      SEED_SUBSTITUTE_TEACHER_EMAIL: ${SEED_SUBSTITUTE_TEACHER_EMAIL}
      SEED_SUBSTITUTE_TEACHER_PASSWORD: ${SEED_SUBSTITUTE_TEACHER_PASSWORD}
      SEED_TEACHING_ASSISTANT_EMAIL: ${SEED_TEACHING_ASSISTANT_EMAIL}
      SEED_TEACHING_ASSISTANT_PASSWORD: ${SEED_TEACHING_ASSISTANT_PASSWORD}
      SEED_TUTOR_EMAIL: ${SEED_TUTOR_EMAIL}
      SEED_TUTOR_PASSWORD: ${SEED_TUTOR_PASSWORD}
      SEED_COUNSELOR_EMAIL: ${SEED_COUNSELOR_EMAIL}
      SEED_COUNSELOR_PASSWORD: ${SEED_COUNSELOR_PASSWORD}
      SEED_LIBRARIAN_EMAIL: ${SEED_LIBRARIAN_EMAIL}
      SEED_LIBRARIAN_PASSWORD: ${SEED_LIBRARIAN_PASSWORD}
      SEED_ACCOUNTANT_EMAIL: ${SEED_ACCOUNTANT_EMAIL}
      SEED_ACCOUNTANT_PASSWORD: ${SEED_ACCOUNTANT_PASSWORD}
      SEED_CASHIER_EMAIL: ${SEED_CASHIER_EMAIL}
      SEED_CASHIER_PASSWORD: ${SEED_CASHIER_PASSWORD}
      SEED_IT_STAFF_EMAIL: ${SEED_IT_STAFF_EMAIL}
      SEED_IT_STAFF_PASSWORD: ${SEED_IT_STAFF_PASSWORD}
      SEED_SECURITY_EMAIL: ${SEED_SECURITY_EMAIL}
      SEED_SECURITY_PASSWORD: ${SEED_SECURITY_PASSWORD}
      SEED_NURSE_EMAIL: ${SEED_NURSE_EMAIL}
      SEED_NURSE_PASSWORD: ${SEED_NURSE_PASSWORD}
      SEED_JANITOR_EMAIL: ${SEED_JANITOR_EMAIL}
      SEED_JANITOR_PASSWORD: ${SEED_JANITOR_PASSWORD}
      SEED_DRIVER_EMAIL: ${SEED_DRIVER_EMAIL}
      SEED_DRIVER_PASSWORD: ${SEED_DRIVER_PASSWORD}
      SEED_CANTEEN_STAFF_EMAIL: ${SEED_CANTEEN_STAFF_EMAIL}
      SEED_CANTEEN_STAFF_PASSWORD: ${SEED_CANTEEN_STAFF_PASSWORD}
      SEED_AUDITOR_EMAIL: ${SEED_AUDITOR_EMAIL}
      SEED_AUDITOR_PASSWORD: ${SEED_AUDITOR_PASSWORD}
      SEED_EXAMINER_EMAIL: ${SEED_EXAMINER_EMAIL}
      SEED_EXAMINER_PASSWORD: ${SEED_EXAMINER_PASSWORD}
      SEED_GUEST_EMAIL: ${SEED_GUEST_EMAIL}
      SEED_GUEST_PASSWORD: ${SEED_GUEST_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leedtech-network
    restart: unless-stopped

  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: leedtech-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leedtech-network
    restart: unless-stopped

  # ─── Redis Cache ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: leedtech-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leedtech-network
    restart: unless-stopped

# ─── Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────
networks:
  leedtech-network:
    driver: bridge